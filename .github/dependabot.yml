version: 2
updates:
- package-ecosystem: "docker"
  directory: "/rootfs"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7
  groups:
    action-deps:
      patterns:
        - "*"
