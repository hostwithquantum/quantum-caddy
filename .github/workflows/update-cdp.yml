name: update

on:
  workflow_dispatch:
  schedule:
  - cron: '0 0 * * *'

permissions:
  contents: "write"
  pull-requests: "write"

jobs:
  updatecli:
    runs-on: "ubuntu-latest"
    steps:
    - uses: updatecli/updatecli-action@7fea18dfb6a2d7077cd040e48ed658009bee5c6f # v2
    - run: updatecli pipeline diff --config ./updatecli/updatecli.d
      env:
        UPDATECLI_GITHUB_ACTOR: ${{ github.actor }}
        UPDATECLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - run: updatecli pipeline apply --debug --config ./updatecli/updatecli.d
      env:
        UPDATECLI_GITHUB_ACTOR: ${{ github.actor }}
        UPDATECLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
